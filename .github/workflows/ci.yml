name: CI

on:
  pull_request:
    branches: [main]

jobs:
  agent-docs:
    name: Check Agent Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required agent docs exist
        run: |
          missing=0
          for f in documents/SPEC.md documents/BACKLOG.md documents/HANDOFF.md; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          exit $missing
